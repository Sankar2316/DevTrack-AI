# DevTrack AI Application Properties

# ----------------------------------------------------
# DATABASE CONFIGURATION
# Default: H2 In-Memory Database for instant local execution
# ----------------------------------------------------
spring.datasource.url=jdbc:h2:mem:devtrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ----------------------------------------------------
# OPTIONAL: MySQL Database Configuration
# Uncomment the block below to run on a local MySQL server
# ----------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/devtrack_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ----------------------------------------------------
# JPA / HIBERNATE SETTINGS
# ----------------------------------------------------
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Seed Data settings for H2 schema seeding on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:data.sql

# ----------------------------------------------------
# JWT SECURITY PROPERTIES
# ----------------------------------------------------
devtrack.jwt.secret=9a67a86c7cf6e15d862e3dcd14e5a9b9a67a86c7cf6e15d862e3dcd14e5a9b9
devtrack.jwt.expiration-ms=604800000

# ----------------------------------------------------
# FILE UPLOAD LIMITS (Resume Analyzer)
# ----------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ----------------------------------------------------
# PORT CONFIGURATION
# ----------------------------------------------------
server.port=8080
